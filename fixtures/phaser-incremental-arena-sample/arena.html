<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Incremental Arena Fixture</title>
    <link rel="stylesheet" href="src/styles/arena.css">
  </head>
  <body>
    <section id="arenaShell">
      <div id="arena-status">
        <span id="arenaEnergy">Energy: 0</span>
        <span id="arenaWave">Wave: 1</span>
        <span id="arenaDefeated">Defeated: 0</span>
        <span id="arenaCombo">Combo: 0</span>
      </div>
      <div id="arenaMount"></div>
      <aside id="arenaShop">
        <select id="arenaSkinSelect"></select>
        <button id="arenaMuteBtn">Mute</button>
        <button id="arenaResetBtn">Reset</button>
        <div id="arenaUpgradeList"></div>
      </aside>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="src/arena/data/arenaBalanceConfig.js"></script>
    <script src="src/arena/systems/ImpactEffectSystem.js"></script>
    <script src="src/arena/systems/CursorAttackSystem.js"></script>
    <script src="src/arena/ui/ArenaHud.js"></script>
    <script src="src/arena/ui/UpgradePanel.js"></script>
    <script src="src/arena/scenes/ArenaScene.js"></script>
    <script src="src/arena/main.js"></script>
  </body>
</html>
